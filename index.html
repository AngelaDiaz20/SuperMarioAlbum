<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Super Mario Sticker Checklist</title>
    <meta
      name="description"
      content="Checklist interactiva para llevar el control de tu álbum de cromos/láminas de Super Mario: conseguidos, faltantes y repetidas."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#albumView">Saltar al contenido</a>

    <header class="app-header">
      <div class="header-inner">
        <div class="header-top">
          <div>
            <h1 class="app-title">Super Mario Sticker Checklist</h1>
            <!--<div class="app-meta">
              <span class="meta-pill meta-pill-soft">Colección / Sticker album</span>
              <span class="meta-pill meta-pill-soft">2026</span>
             <span class="sync-pill" id="syncStatusPill">Cargando colección…</span>
            </div> -->
          </div>
          <div class="header-mini" aria-label="Resumen rápido">
            <div class="mini-metric">
              <div class="mini-label">Tengo</div>
              <div class="mini-value" id="metricHave">0</div>
            </div>
            <div class="mini-metric">
              <div class="mini-label">Faltan</div>
              <div class="mini-value" id="metricMissing">224</div>
            </div>
            <div class="mini-metric">
              <div class="mini-label">Repetidas</div>
              <div class="mini-value" id="metricDupes">0</div>
            </div>
          </div>
        </div>

        <div class="progress-wrap" aria-label="Progreso visual">
          <div class="progress-meta">
            <span class="progress-text" id="progressText">0.0%</span>
            <span class="progress-sub" id="summaryLine">Tienes 0 de 224 cromos</span>
          </div>
          <div class="progress-rail" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            <span class="progress-marker" id="progressMarker" aria-hidden="true">⭐</span>
          </div>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <section id="albumView" class="view is-active" aria-label="Álbum">
        <section class="album-controls" aria-label="Controles de álbum">
          <section class="top-tabs" role="tablist" aria-label="Filtros">
            <button class="tab" type="button" data-filter="all" role="tab">Todas</button>
            <button class="tab" type="button" data-filter="missing" role="tab">Me faltan</button>
            <button class="tab" type="button" data-filter="dupes" role="tab">Repetidas</button>
            <button class="tab tab-secondary" type="button" id="orderBtn" aria-label="Orden">
              Orden
            </button>
          </section>

          <section class="search-panel" aria-label="Buscar">
            <div class="search-box">
              <input
                id="searchInput"
                class="input"
                type="search"
                inputmode="search"
                autocomplete="off"
                placeholder="Buscar: 45, 045, M12…"
              />
              <button class="btn btn-primary" id="searchBtn" type="button">Buscar</button>
              <button class="btn btn-ghost" id="clearSearchBtn" type="button" aria-label="Limpiar búsqueda">
                ✕
              </button>
            </div>
            <!--<div class="help" id="searchHelp">
              Tip: <strong>45</strong> o <strong>045</strong>, y póster: <strong>M12</strong>
            </div> -->
          </section>
        </section>

        <section id="albumSections" class="album-sections" aria-label="Secciones del álbum"></section>
      </section>
      <section id="statsView" class="view" aria-label="Estadísticas"></section>
      <section id="syncView" class="view" aria-label="Sincronización"></section>
      <section id="settingsView" class="view" aria-label="Configuración"></section>
    </main>

    <nav class="bottom-nav" aria-label="Navegación inferior">
      <button type="button" class="nav-btn is-active" data-view="album" aria-label="Álbum">
        <span class="nav-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M4 5.5c0-1 1-1.7 2-1.5l10 2c.9.2 2 .9 2 2v12.8c0 .9-.9 1.5-1.8 1.3l-10.4-2.1c-1-.2-1.8-1.1-1.8-2.1V5.5z" />
            <path d="M6 6.6h9.5M6 9h9.5M6 11.4h7.2" />
          </svg>
        </span>
        <span class="nav-text">Álbum</span>
      </button>
      <button type="button" class="nav-btn" data-view="stats" aria-label="Estadísticas">
        <span class="nav-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M5 19V10M10 19V5M15 19v-8M20 19v-12" />
            <path d="M4 19h17" />
          </svg>
        </span>
        <span class="nav-text">Estadísticas</span>
      </button>
      <button type="button" class="nav-btn" data-view="sync" aria-label="Sync">
        <span class="nav-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M20 7v5h-5" />
            <path d="M4 17v-5h5" />
            <path d="M6.5 9.5A7 7 0 0 1 20 12" />
            <path d="M17.5 14.5A7 7 0 0 1 4 12" />
          </svg>
        </span>
        <span class="nav-text">Sync</span>
      </button>
      <button type="button" class="nav-btn" data-view="settings" aria-label="Configuración">
        <span class="nav-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z" />
            <path
              d="M19.4 13.2l1.1-1.9-1.6-2.7-2.2.4a7.7 7.7 0 0 0-1.2-.7L15 6l-3-.9-1.5 1.7h-1.1L7.9 5.1 5 6l.5 2a7.7 7.7 0 0 0-1.2.7l-2.2-.4-1.6 2.7 1.1 1.9a7.8 7.8 0 0 0 0 1.6L.5 16.7l1.6 2.7 2.2-.4c.4.3.8.5 1.2.7l-.5 2 2.9.9 1.5-1.7h1.1l1.5 1.7 3-.9-.5-2c.4-.2.8-.4 1.2-.7l2.2.4 1.6-2.7-1.1-1.9c.1-.5.1-1.1 0-1.6z"
            />
          </svg>
        </span>
        <span class="nav-text">Config</span>
      </button>
    </nav>

    <div class="toast-region" aria-live="polite" aria-atomic="true" id="toastRegion"></div>

    <div id="stickerModal" class="modal" hidden>
      <div class="modal-overlay" data-action="close-modal" aria-hidden="true"></div>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        aria-describedby="modalDesc"
      >
        <header class="modal-header">
          <div>
            <div class="modal-title" id="modalTitle">Editar ficha</div>
            <div class="modal-desc" id="modalDesc">
              Ajusta “La tengo” y repetidas. Mantener presionado abre este panel.
            </div>
          </div>
          <button class="icon-btn" type="button" data-action="close-modal" aria-label="Cerrar">
            ✕
          </button>
        </header>

        <div class="modal-body">
          <div class="modal-kv">
            <div class="kv">
              <div class="kv-label">Ficha</div>
              <div class="kv-value" id="modalStickerId">—</div>
            </div>
            <div class="kv">
              <div class="kv-label">Sección</div>
              <div class="kv-value" id="modalStickerSection">—</div>
            </div>
          </div>

          <label class="toggle-row" for="modalOwned">
            <input id="modalOwned" type="checkbox" />
            <span>La tengo</span>
          </label>

          <div class="modal-stepper" aria-label="Repetidas">
            <div class="stepper-label">Repetidas</div>
            <div class="stepper">
              <button class="step-btn" type="button" data-action="modal-dupe-dec" aria-label="Restar repetida">
                −
              </button>
              <div class="step-count" id="modalDupes">0</div>
              <button class="step-btn" type="button" data-action="modal-dupe-inc" aria-label="Sumar repetida">
                +
              </button>
            </div>
          </div>
        </div>

        <footer class="modal-actions">
          <button class="btn btn-danger" type="button" data-action="modal-reset">Resetear</button>
          <div class="modal-actions-right">
            <button class="btn btn-ghost" type="button" data-action="close-modal">Cerrar</button>
            <button class="btn btn-primary" type="button" data-action="modal-save">Guardar</button>
          </div>
        </footer>
      </div>
    </div>

    <input id="importFile" type="file" accept="application/json" class="sr-only" tabindex="-1" />
  </body>
</html>
